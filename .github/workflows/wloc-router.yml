name: wloc-router

on:
  push:
    paths:
      - "wloc-router/**"
      - ".github/workflows/wloc-router.yml"
  pull_request:
    paths:
      - "wloc-router/**"
      - ".github/workflows/wloc-router.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wloc-router
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Unit tests
        run: |
          set +e
          cargo test 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          {
            echo "## cargo test"
            echo
            echo '```text'
            tail -200 cargo-test.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$status" -ne 0 ]; then
            message=$(tail -120 cargo-test.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error file=wloc-router/Cargo.toml,title=cargo test failed::$message"
          fi
          exit "$status"

      - name: Clippy
        run: cargo clippy --all-targets

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: wloc-router-x86_64-linux-gnu
            install: ""
          - target: x86_64-unknown-linux-musl
            artifact: wloc-router-x86_64-linux-musl
            install: "sudo apt-get update && sudo apt-get install -y musl-tools"
    defaults:
      run:
        working-directory: wloc-router
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install target packages
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/wloc-router dist/
          cp -r deploy dist/
          cp README.md dist/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: wloc-router/${{ matrix.artifact }}.tar.gz

  release:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-dist
          pattern: wloc-router-*
          merge-multiple: true

      - name: Publish rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: latest
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "refs/tags/$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" release-dist/*.tar.gz \
            --title "wloc-router latest" \
            --notes "Automated build from $GITHUB_SHA" \
            --latest
