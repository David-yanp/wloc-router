name: wloc-router

on:
  push:
    paths:
      - "wloc-router/**"
      - ".github/workflows/wloc-router.yml"
  pull_request:
    paths:
      - "wloc-router/**"
      - ".github/workflows/wloc-router.yml"
  workflow_dispatch:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wloc-router
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wloc-router/target
          key: cargo-${{ runner.os }}-${{ hashFiles('wloc-router/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Unit tests
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets

  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: wloc-router-x86_64-linux-gnu
            install: ""
          - target: x86_64-unknown-linux-musl
            artifact: wloc-router-x86_64-linux-musl
            install: "sudo apt-get update && sudo apt-get install -y musl-tools"
    defaults:
      run:
        working-directory: wloc-router
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install target packages
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            wloc-router/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('wloc-router/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/wloc-router dist/
          cp -r deploy dist/
          cp README.md dist/
          tar -C dist -czf ${{ matrix.artifact }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: wloc-router/${{ matrix.artifact }}.tar.gz
